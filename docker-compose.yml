
services:
  db:
    image: postgres:16
    container_name: eelap-db
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7.0.11-alpine
    container_name: eelap-redis
    ports:
      - "6379:6379"

  django-web:
    build:
      context: .
      dockerfile: eelap/Dockerfile
    container_name: eelap-web
    env_file:
      - .env.docker
    depends_on:
      - db
      - redis
    ports:
      - "8001:8000"
    volumes:
      - .:/usr/src/app
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

volumes:
  postgres_data: